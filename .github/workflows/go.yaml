name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Lint
        uses: golangci/golangci-lint-action@v3
        
      - name: Install dependencies
        run: go mod tidy

      - name: Build project
        run: go build ./...

      - name: Run tests
        run: go test ./...